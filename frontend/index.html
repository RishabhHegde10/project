/* ─────────────────────────────────────────────
   MINI CHART: Colour Bars
───────────────────────────────────────────── */
function MiniBar({ data, colors }) {
  const mx = Math.max(...data);
  return (
    <div style={{ display:"flex", alignItems:"flex-end", gap:4, height:52 }}>
      {data.map((v,i) => (
        <div key={i} style={{
          flex:1, borderRadius:"6px 6px 0 0",
          background: colors[i % colors.length],
          height:`${(v/mx)*100}%`,
          transition:"height 1s cubic-bezier(.16,1,.3,1)",
          boxShadow:`0 4px 12px ${colors[i%colors.length]}66`,
        }} />
      ))}
    </div>
  );
}

/* ─────────────────────────────────────────────
   CIRCULAR PROGRESS
───────────────────────────────────────────── */
function CircleProgress({ value, color, emoji, size=90 }) {
  const r = (size-14)/2, c = 2*Math.PI*r;
  return (
    <div style={{ position:"relative", width:size, height:size }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#f3e8ff" strokeWidth={10}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none"
          stroke={color} strokeWidth={10}
          strokeDasharray={`${(value/100)*c} ${c}`}
          strokeDashoffset={c*0.25} strokeLinecap="round"
          style={{transition:"stroke-dasharray 1.2s cubic-bezier(.16,1,.3,1)"}}
        />
      </svg>
      <div style={{
        position:"absolute", inset:0,
        display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
      }}>
        <span style={{ fontSize:20 }}>{emoji}</span>
        <span style={{ fontSize:13, fontWeight:900, color, lineHeight:1 }}>{value}%</span>
      </div>
    </div>
  );
}
